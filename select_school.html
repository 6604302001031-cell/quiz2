<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กรอกข้อมูลโรงเรียน</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">ยินดีต้อนรับคุณ {{ session.get('name') }}! 👋</h2>
            <p class="text-slate-500 mt-2 text-sm">กรุณาระบุชื่อโรงเรียนของคุณก่อนเริ่มแข่งขัน</p>
        </div>

        <form id="schoolForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อโรงเรียน / สถาบัน</label>
                <input type="text" id="schoolInput" required placeholder="ตัวอย่าง: โรงเรียนสุราษฎร์ธานี" 
                       class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800">
            </div>

            <div id="errorMessage" class="text-red-500 text-sm hidden"></div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200">
                เข้าสู่เกมการแข่งขัน 🚀
            </button>
        </form>
    </div>

    <script>
        document.getElementById('schoolForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const schoolName = document.getElementById('schoolInput').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch('/api/save-school', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ school: schoolName })
                });
                
                const result = await response.json();

                if (result.status === 'success') {
                    // เมื่อบันทึกสำเร็จ ส่งผู้เล่นไปหน้าเกมหลัก (/user)
                    window.location.href = result.redirect;
                } else {
                    errorDiv.innerText = result.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
