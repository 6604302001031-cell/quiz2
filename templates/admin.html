<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบควบคุมเกม (Admin)</title>
    <style>
        body { font-family: 'Sarabun', Arial, sans-serif; background-color: #f5f7fb; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .admin-container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); width: 100%; max-width: 600px; text-align: center; }
        .admin-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #dee2e6; }
        .admin-info { font-size: 14px; color: #495057; font-weight: bold; }
        .admin-info span { color: #2196f3; }
        .btn-logout { background-color: #dc3545; color: white; padding: 7px 14px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 13px; }
        h2 { color: #333333; margin-bottom: 25px; font-size: 26px; }
        .status-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 20px; border-radius: 8px; text-align: left; margin-bottom: 25px; position: relative; }
        .status-line { font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot-green { background-color: #4caf50; }
        .dot-red { background-color: #f44336; }
        .dot-yellow { background-color: #f1c40f; }
        .timer-box { background-color: #fff9db; border: 1px solid #ffe3e3; padding: 12px; border-radius: 6px; font-size: 22px; font-weight: bold; color: #d9480f; text-align: center; margin-top: 15px; }
        
        /* 🎯 สไตล์กล่องเฉลยคำตอบในเวลาปกติ */
        .answer-box { background-color: #d4edda; border: 1px solid #c3e6cb; padding: 15px; border-radius: 8px; font-size: 20px; font-weight: bold; color: #155724; text-align: center; margin-top: 15px; display: none; }

        .btn { font-size: 16px; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 12px; }
        .btn:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; opacity: 0.7; }
        .btn-orange { background-color: #ff9800; color: white; }
        .btn-blue { background-color: #2196f3; color: white; }
        .btn-yellow { background-color: #f1c40f; color: white; }
        .btn-green { background-color: #2ecc71; color: white; }
        .btn-purple { background-color: #9c27b0; color: white; margin-top: 10px; }
        .btn-red-outline { background-color: white; color: #f44336; border: 1px solid #f44336; }
        .timer-btn-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .timer-btn-group .btn { margin-bottom: 0; }
        .modal-overlay { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: #ffffff; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; position: relative; }
        .close-modal-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; color: #aaa; cursor: pointer; border: none; background: none; }
        .score-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .score-table th, .score-table td { padding: 12px; border-bottom: 1px solid #dee2e6; text-align: left; }
        .score-table th { background-color: #f1f3f5; }

        .show-on-fullscreen { display: none; } 

        /* 🖥️ สไตล์เมื่อเปิดโหมด Fullscreen */
        #fullscreen-target:fullscreen {
            background-color: #ffffff !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            padding: 50px !important;
            box-sizing: border-box !important;
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }
        #fullscreen-target:fullscreen .hide-on-fullscreen { display: none !important; }
        #fullscreen-target:fullscreen .show-on-fullscreen { display: block !important; }
        
        #fullscreen-target:fullscreen #question-info {
            font-size: 46px !important;
            color: #111111 !important;
            text-align: center !important;
            line-height: 1.6 !important;
            margin: auto 0 20px 0 !important;
            max-width: 90% !important;
        }
        #fullscreen-target:fullscreen .timer-box {
            font-size: 65px !important;
            padding: 25px 60px !important;
            border-radius: 16px !important;
            width: 80% !important;
            max-width: 750px !important;
            margin-top: 20px !important;
            margin-bottom: 20px !important;
        }
        /* ขยายกล่องเฉลยคำตอบตอนเต็มจอ */
        #fullscreen-target:fullscreen .answer-box {
            font-size: 45px !important;
            padding: 25px 50px !important;
            border-radius: 16px !important;
            width: 80% !important;
            max-width: 750px !important;
            margin-top: 20px !important;
            margin-bottom: auto !important;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header-bar">
        <div class="admin-info">👤 แอดมิน: <span>{{ session.name }}</span></div>
        <a href="/logout" class="btn-logout">🚪 ออกจากระบบ</a>
    </div>

    <h2>👑 ระบบควบคุมเกม (แอดมิน)</h2>

    <div class="status-box" id="fullscreen-target">
        <button onclick="toggleFullscreen()" class="btn btn-red-outline show-on-fullscreen" style="position: absolute; top: 20px; right: 20px; width: auto; padding: 10px 20px; font-size: 16px; margin: 0; z-index: 99999;">❌ ออกจากเต็มจอ (Cancel Fullscreen)</button>

        <div class="status-line hide-on-fullscreen"><strong>สถานะเกม:</strong>&nbsp;<span id="game-status-text">กำลังโหลด...</span></div>
        <div class="status-line" id="question-info" style="font-weight: bold; color: #495057;">โจทย์ปัจจุบัน: กำลังโหลด...</div>
        <div id="timer-display" class="timer-box">⏱️ เวลาที่เหลือ: 120 วินาที</div>
        
        <div id="answer-box" class="answer-box">🎯 เฉลยคำตอบ: <span id="answer-text">-</span></div>
        
        <button onclick="toggleFullscreen()" class="btn btn-orange hide-on-fullscreen" style="margin-top: 15px; padding: 8px; font-size: 14px; width: auto; display: block; margin-left: auto; margin-right: auto;">🖥️ ขยายหน้าจอโจทย์ (Fullscreen)</button>
    </div>

    <button onclick="controlGame('/api/start')" class="btn btn-blue" id="btn-start">▶️ กดเพื่อเริ่ม (Start)</button>
    
    <div class="timer-btn-group" id="timer-control-group" style="display: none;">
        <button onclick="pauseTimer()" class="btn btn-yellow" id="btn-pause">⏸️ หยุดเวลา (Pause)</button>
        <button onclick="resumeTimer()" class="btn btn-green" id="btn-resume" style="display: none;">▶️ นับเวลาต่อ (Resume)</button>
    </div>

    <button onclick="controlGame('/api/timeout')" class="btn btn-orange" id="btn-timeout" style="display: none;">⏱️ หมดเวลาข้อนี้ (Timeout)</button>
    <button onclick="controlGame('/api/next')" class="btn btn-blue" id="btn-next" style="display: none;">⏩ ข้อถัดไป (Next Question)</button>
    
    <button onclick="openScoreModal()" class="btn btn-purple">📊 กดดูคะแนนทีม (View Scores)</button>
    <hr style="border: 0; border-top: 1px solid #dee2e6; margin: 20px 0;">
    <button onclick="controlGame('/api/reset')" class="btn btn-red-outline" id="btn-reset">🔄 รีเซ็ตระบบเกมทั้งหมด (Reset)</button>
</div>

<div id="score-modal" class="modal-overlay" onclick="closeScoreModalOutside(event)">
    <div class="modal-content">
        <button class="close-modal-btn" onclick="closeScoreModal()">&times;</button>
        <h3 style="margin-top: 0;">🏆 ตารางคะแนนรวมทีม</h3>
        <table class="score-table">
            <thead><tr><th>อันดับ</th><th>ชื่อทีม / โรงเรียน</th><th>คะแนน</th></tr></thead>
            <tbody id="score-board-body"><tr><td colspan="3" style="text-align:center;">ยังไม่มีคะแนนสะสม</td></tr></tbody>
        </table>
        <button onclick="closeScoreModal()" class="btn btn-blue" style="margin-top: 20px; margin-bottom: 0;">ปิด</button>
    </div>
</div>

<script>
    let lastQuestionNumber = 0;
    let timeLeft = 120;
    let countdownInterval = null;
    let stateCheckInterval = null;
    let isPaused = false;
    let isActionInProgress = false;
    let activeScores = {}; 

    function toggleFullscreen() {
        const elem = document.getElementById('fullscreen-target');
        if (!document.fullscreenElement) {
            elem.requestFullscreen().catch(err => {
                alert(`ไม่สามารถเปิดโหมดเต็มจอได้: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function updateTimerDisplay() {
        const timerDisplay = document.getElementById('timer-display');
        if (timeLeft <= 0) {
            timerDisplay.innerText = `🔒 หมดเวลาส่งคำตอบแล้ว`;
            return;
        }
        if (isPaused) {
            timerDisplay.innerText = `⏸️ หยุดเวลาชั่วคราว: ${timeLeft} วินาที`;
            return;
        }
        timerDisplay.innerText = `⏱️ เวลาที่เหลือ: ${timeLeft} วินาที`;
    }

    function runCountdown() {
        if (isPaused) return;
        if (timeLeft > 0) {
            timeLeft--;
            updateTimerDisplay();
        } else {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
    }

    function startTimer(resetTime = true) {
        if (countdownInterval) clearInterval(countdownInterval);
        if (resetTime) timeLeft = 120;
        isPaused = false;
        document.getElementById('btn-pause').style.display = 'block';
        document.getElementById('btn-resume').style.display = 'none';
        updateTimerDisplay();
        countdownInterval = setInterval(runCountdown, 1000);
    }

    function pauseTimer() {
        isPaused = true;
        document.getElementById('btn-pause').style.display = 'none';
        document.getElementById('btn-resume').style.display = 'block';
        updateTimerDisplay();
    }

    function resumeTimer() {
        isPaused = false;
        document.getElementById('btn-pause').style.display = 'block';
        document.getElementById('btn-resume').style.display = 'none';
        updateTimerDisplay();
    }

    function openScoreModal() { 
        updateScoreBoard(activeScores);
        document.getElementById('score-modal').style.display = 'flex'; 
    }
    function closeScoreModal() { document.getElementById('score-modal').style.display = 'none'; }
    function closeScoreModalOutside(e) { if (e.target.id === 'score-modal') closeScoreModal(); }

    function toggleButtonsState(disabled) {
        ['btn-start', 'btn-pause', 'btn-resume', 'btn-timeout', 'btn-next', 'btn-reset'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.disabled = disabled;
        });
    }

    function renderUI(data) {
        if (!data) return;
        const statusText = document.getElementById('game-status-text');
        const questionInfo = document.getElementById('question-info');
        const timerControlGroup = document.getElementById('timer-control-group');
        const answerBox = document.getElementById('answer-box');
        const answerText = document.getElementById('answer-text');

        if (data.school_scores) {
            activeScores = data.school_scores;
        }

        if (data.is_started) {
            document.getElementById('btn-start').style.display = 'none';
            if (data.is_time_up || data.is_end) {
                document.getElementById('btn-timeout').style.display = 'none';
                document.getElementById('btn-next').style.display = data.is_end ? 'none' : 'block';
                timerControlGroup.style.display = 'none';
            } else {
                document.getElementById('btn-timeout').style.display = 'block';
                document.getElementById('btn-next').style.display = 'none';
                timerControlGroup.style.display = 'flex';
            }
        } else {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-timeout').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
            timerControlGroup.style.display = 'none';
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            document.getElementById('timer-display').innerText = `⏳ ระบบยังไม่ได้เริ่มเกม`;
            lastQuestionNumber = 0;
        }

        if (data.is_started && !data.is_time_up && !data.is_end) {
            if (data.current_number !== lastQuestionNumber) {
                lastQuestionNumber = data.current_number;
                startTimer(true);
            }
        }

        if (data.is_time_up || data.is_end) {
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            document.getElementById('timer-display').innerText = data.is_end ? `🏁 จบการแข่งขันแล้ว` : `🔒 หมดเวลาส่งคำตอบแล้ว`;
        }

        /* 🌟 เงื่อนไขการเปิด-ปิดการแสดงคำตอบเฉลย */
        if (data.is_started && (data.is_time_up || data.is_end)) {
            // แสดงเฉลยคำตอบเมื่อหมดเวลา หรือจบเกมแล้ว (ระหว่างรอเปิดข้อถัดไป)
            answerText.innerText = data.answer ? data.answer : 'ไม่มีข้อมูลเฉลยคำตอบในข้อนี้';
            answerBox.style.display = 'block';
        } else {
            // ซ่อนเฉลยในเวลาที่กำลังแข่ง หรือยังไม่เริ่มเกม
            answerBox.style.display = 'none';
        }

        if (!data.is_started) {
            statusText.innerHTML = '<span class="status-dot dot-red"></span> ยังไม่เริ่มเกม';
            questionInfo.innerText = 'โจทย์ปัจจุบัน: รอแอดมินกดเริ่มเกม';
        } else if (data.is_end) {
            statusText.innerHTML = '<span class="status-dot dot-red"></span> สิ้นสุดการแข่งขัน';
            questionInfo.innerText = '🏆 จบเกมการแข่งขันครบทุกข้อแล้ว!';
        } else if (data.is_time_up) {
            statusText.innerHTML = '<span class="status-dot dot-red"></span> หมดเวลาข้อนี้แล้ว';
            questionInfo.innerText = `โจทย์ปัจจุบัน ข้อที่ ${data.current_number}: ${data.question}`;
        } else {
            statusText.innerHTML = '<span class="status-dot dot-green"></span> กำลังเปิดรับคำตอบ';
            questionInfo.innerText = `โจทย์ปัจจุบัน ข้อที่ ${data.current_number}: ${data.question}`;
        }
    }

    function controlGame(url) {
        if (isActionInProgress) return;
        isActionInProgress = true;
        toggleButtonsState(true);

        fetch(url, { method: 'POST' })
        .then(res => res.json())
        .then(resData => {
            if (resData.status === "success" && resData.state) {
                renderUI(resData.state);
            }
            setTimeout(() => { isActionInProgress = false; toggleButtonsState(false); }, 400);
        })
        .catch(err => {
            console.error(err);
            isActionInProgress = false;
            toggleButtonsState(false);
        });
    }

    function checkGameState() {
        if (isActionInProgress) return;
        fetch('/api/state')
        .then(res => res.json())
        .then(data => renderUI(data))
        .catch(err => console.error(err));
    }

    function updateScoreBoard(schoolScores) {
        const tbody = document.getElementById('score-board-body');
        if (!schoolScores || Object.keys(schoolScores).length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">ยังไม่มีคะแนนสะสม</td></tr>';
            return;
        }
        let arr = Object.keys(schoolScores).map(k => ({ name: k, score: schoolScores[k] })).sort((a,b) => b.score - a.score);
        tbody.innerHTML = arr.map((item, i) => `<tr><td><strong>${i+1}</strong></td><td>${item.name}</td><td><span style="color:#2196f3; font-weight:bold;">${item.score} คะแนน</span></td></tr>`).join('');
    }

    stateCheckInterval = setInterval(checkGameState, 2000);
    window.onload = checkGameState;
</script>
</body>
</html>
