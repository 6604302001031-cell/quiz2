<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอผู้เล่น - ตอบคำถาม</title>
    <style>
        body {
            font-family: 'Sarabun', Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* 🚪 สไตล์สำหรับแถบ Header ด้านบนสุดของผู้เล่น */
        .player-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        .player-info {
            font-size: 14px;
            color: #495057;
            font-weight: bold;
            text-align: left;
        }
        .player-info span {
            color: #2196f3;
        }
        
        /* 🏆 สไตล์สำหรับส่วนจัดการด้านขวา (คะแนน + ปุ่มออก) */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .score-badge {
            background-color: #ff9800;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(255, 152, 0, 0.3);
        }

        .btn-logout {
            background-color: #6c757d;
            color: white;
            padding: 7px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 4px rgba(108, 117, 125, 0.2);
        }
        .btn-logout:hover {
            background-color: #5a6268;
        }

        h2 {
            color: #333333;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #2196f3;
            outline: none;
        }
        .btn {
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-blue {
            background-color: #2196f3;
            color: white;
        }
        .btn-blue:hover {
            background-color: #0b7dda;
        }
        .btn-blue:disabled {
            background-color: #ced4da;
            cursor: not-allowed;
            box-shadow: none;
        }
        /* ⏳ หน้าจอรอสัญญาณ */
        .waiting-box {
            padding: 30px;
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            background-color: #f8f9fa;
        }
        .loader {
            font-size: 50px;
            margin-bottom: 15px;
            animation: spin 2s linear infinite;
            display: inline-block;
        }
        /* 📝 หน้าจอทำโจทย์ */
        .quiz-box {
            display: none;
        }
        .status-alert {
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="player-header-bar">
        <div class="player-info">
            👤 ผู้เล่น: <span>{{ session.name }}</span>
        </div>
        <div class="header-actions">
            <div class="score-badge">🏆 คะแนน: <span id="player-score">0</span></div>
            <a href="/logout" class="btn-logout">🚪 ออก</a>
        </div>
    </div>

    <div id="waiting-screen" class="waiting-box">
        <div class="loader">⏳</div>
        <h2>กรุณารอสักครู่...</h2>
        <p style="color: #6c757d; font-size: 16px;">
            อีเมลของคุณ: <span id="player-email-tag" style="font-weight: bold; color: #2196f3;">{{ session.email }}</span>
        </p>
        <p style="color: #868e96;">แผงส่งคำตอบจะแสดงขึ้นมาเมื่อแอดมินกดเริ่มเกม</p>
    </div>

    <div id="quiz-screen" class="quiz-box">
        <h2 id="question-number">ส่งคำตอบข้อที่ -</h2>

        <form id="answer-form" onsubmit="submitAnswer(event)">
            <div class="input-group">
                <input type="text" id="answer-input" placeholder="พิมพ์คำตอบของคุณที่นี่..." required autocomplete="off">
            </div>

            <button type="submit" id="submit-btn" class="btn btn-blue">ส่งคำตอบ (Submit)</button>
        </form>
        
        <div id="result-message" class="status-alert"></div>
    </div>
</div>

<script>
    const playerId = "{{ session.email }}";
    const playerName = "{{ session.name }}";

    let currentQuestionNumber = 0;

    function checkGameState() {
        // 🛠️ แก้ไข: แนบ playerId ส่งไปกับ URL เพื่อให้หลังบ้านดึงคะแนนของคนนี้ได้ถูกต้อง
        fetch(`/api/state?player_id=${encodeURIComponent(playerId)}`)
        .then(res => res.json())
        .then(data => {
            // อัปเดตคะแนนผู้เล่นที่ได้มาจากเซิร์ฟเวอร์
            if (data.player_score !== undefined) {
                document.getElementById('player-score').innerText = data.player_score;
            }

            const waitingScreen = document.getElementById('waiting-screen');
