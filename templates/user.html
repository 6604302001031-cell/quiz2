<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอผู้เล่น - ตอบคำถาม</title>
    <style>
        body {
            font-family: 'Sarabun', Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* 🚪 สไตล์สำหรับแถบ Header ด้านบนสุดของผู้เล่น */
        .player-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        .player-info {
            font-size: 14px;
            color: #495057;
            font-weight: bold;
            text-align: left;
        }
        .player-info span {
            color: #2196f3;
        }
        
        /* 🏆 สไตล์สำหรับส่วนจัดการด้านขวา (คะแนน + ปุ่มออก) */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .score-badge {
            background-color: #ff9800;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(255, 152, 0, 0.3);
        }

        .btn-logout {
            background-color: #6c757d;
            color: white;
            padding: 7px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 4px rgba(108, 117, 125, 0.2);
        }
        .btn-logout:hover {
            background-color: #5a6268;
        }

        h2 {
            color: #333333;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            box-sizing: border-box;
