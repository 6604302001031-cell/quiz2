<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าจอผู้เล่น - ตอบคำถาม</title>
    <style>
        body {
            font-family: 'Sarabun', Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .player-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        .player-info {
            font-size: 14px;
            color: #495057;
            font-weight: bold;
            text-align: left;
        }
        .player-info span {
            color: #2196f3;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .score-badge {
            background-color: #ff9800;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(255, 152, 0, 0.3);
        }

        .btn-logout {
            background-color: #6c757d;
            color: white;
            padding: 7px 14px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 4px rgba(108, 117, 125, 0.2);
        }
        .btn-logout:hover {
            background-color: #5a6268;
        }

        h2 {
            color: #333333;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            font-size: 20px;
            text-align: center;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #2196f3;
            outline: none;
        }
        .btn {
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-blue {
            background-color: #2196f3;
            color: white;
        }
        .btn-blue:hover {
            background-color: #0b7dda;
        }
        .btn-blue:disabled {
            background-color: #ced4da;
            cursor: not-allowed;
            box-shadow: none;
        }
        .waiting-box {
            padding: 30px;
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            background-color: #f8f9fa;
        }
        .loader {
            font-size: 50px;
            margin-bottom: 15px;
            animation: spin 2s linear infinite;
            display: inline-block;
        }
        .quiz-box {
            display: none;
        }
        .status-alert {
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="player-header-bar">
        <div class="player-info">
            👤 ผู้เล่น: <span>{{ session.name }}</span><br>
            <small id="team-name-display" style="color: #e91e63; display: none; font-size: 14px; margin-top: 5px;"></small>
        </div>
        <div class="header-actions">
            <div class="score-badge">🏆 คะแนน: <span id="player-score">0</span></div>
            <a href="/logout" class="btn-logout">🚪 ออก</a>
        </div>
    </div>

    <div id="setup-screen" class="waiting-box" style="display: none;">
        <div style="font-size: 50px; margin-bottom: 15px;">🏫</div>
        <h2 style="margin-top: 0;">ตั้งชื่อทีม / โรงเรียน</h2>
        <p style="color: #6c757d; font-size: 16px; margin-bottom: 20px;">กรุณาระบุชื่อโรงเรียนหรือสังกัดของคุณ<br>เพื่อใช้ในการบันทึกคะแนนรวม</p>
        <div class="input-group">
            <input type="text" id="team-input" placeholder="พิมพ์ชื่อโรงเรียนที่นี่..." autocomplete="off">
        </div>
        <button onclick="saveTeamName()" class="btn btn-blue">บันทึกชื่อทีม</button>
    </div>

    <div id="waiting-screen" class="waiting-box" style="display: none;">
        <div class="loader">⏳</div>
        <h2>กรุณารอสักครู่...</h2>
        <p style="color: #6c757d; font-size: 16px;">
            อีเมลของคุณ: <span id="player-email-tag" style="font-weight: bold; color: #2196f3;">{{ session.email }}</span>
        </p>
        <p style="color: #868e96;">แผงส่งคำตอบจะแสดงขึ้นมาเมื่อแอดมินกดเริ่มเกม</p>
    </div>

    <div id="quiz-screen" class="quiz-box">
        <h2 id="question-number">ส่งคำตอบข้อที่ -</h2>

        <form id="answer-form" onsubmit="submitAnswer(event)">
            <div class="input-group">
                <input type="text" id="answer-input" placeholder="พิมพ์คำตอบของคุณที่นี่..." required autocomplete="off">
            </div>

            <button type="submit" id="submit-btn" class="btn btn-blue">ส่งคำตอบ (Submit)</button>
        </form>
        
        <div id="result-message" class="status-alert"></div>
    </div>
</div>

<script>
    const playerId = "{{ session.email }}";
    const playerName = "{{ session.name }}";

    let currentQuestionNumber = 0;
    let hasSubmittedThisQuestion = false;
    
    // 🌟 ดึงชื่อทีมที่เคยบันทึกไว้ในเบราว์เซอร์
    let teamName = localStorage.getItem('quiz_team_name');
    let gamePollingInterval = null;

    // 🌟 ระบบตรวจสอบสถานะตอนเปิดหน้าเว็บ
    function initPlayer() {
        if (!teamName) {
            // ถ้ายังไม่มีชื่อทีม โชว์หน้ากรอกชื่อ บล็อกหน้าอื่นๆ
            document.getElementById('setup-screen').style.display = 'block';
            document.getElementById('waiting-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'none';
            
            // หยุดดึงข้อมูลเซิร์ฟเวอร์ชั่วคราวเพื่อประหยัดทรัพยากร
            if (gamePollingInterval) clearInterval(gamePollingInterval);
        } else {
            // ถ้ามีชื่อทีมแล้ว ซ่อนหน้ากรอกชื่อ โชว์ชื่อมุมซ้ายบน และรันระบบเกม
            document.getElementById('setup-screen').style.display = 'none';
            
            const teamDisplay = document.getElementById('team-name-display');
            teamDisplay.style.display = 'inline-block';
            teamDisplay.innerText = `🏫 ทีม: ${teamName}`;
            
            checkGameState();
            fetchMyScore();
            
            // สั่งดึงข้อมูลทุก 1 วินาที
            if (!gamePollingInterval) {
                gamePollingInterval = setInterval(checkGameState, 1000);
            }
        }
    }

    // 🌟 ฟังก์ชันบันทึกชื่อทีม
    function saveTeamName() {
        const inputVal = document.getElementById('team-input').value.trim();
        if (inputVal.length < 2) {
            alert('กรุณากรอกชื่อโรงเรียนหรือชื่อทีมอย่างน้อย 2 ตัวอักษรครับ');
            return;
        }
        teamName = inputVal;
        localStorage.setItem('quiz_team_name', teamName); // บันทึกลงเครื่องผู้เล่น
        initPlayer(); // โหลดระบบเกม
    }

    // กด Enter ในช่องกรอกชื่อเพื่อบันทึก
    document.getElementById('team-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') saveTeamName();
    });

    // ดึงคะแนนล่าสุดของตนเอง
    function fetchMyScore() {
        fetch('/api/my-score')
        .then(res => res.json())
        .then(data => {
            if (data.score !== undefined) {
                document.getElementById('player-score').innerText = data.score;
            }
        })
        .catch(err => console.error('Error fetching score:', err));
    }

    // ตรวจสอบสถานะของเกม (Real-time Sync)
    function checkGameState() {
        if (!teamName) return; // ถ้ายงไม่มีชื่อทีม ไม่ต้องดึงข้อมูล

        fetch('/api/state')
        .then(res => res.json())
        .then(data => {
            const waitingScreen = document.getElementById('waiting-screen');
            const quizScreen = document.getElementById('quiz-screen');
            const answerInput = document.getElementById('answer-input');
            const submitBtn = document.getElementById('submit-btn');
            const resultMsg = document.getElementById('result-message');
            
            // กรณีที่เกมยังไม่เริ่ม หรือถูกรีเซ็ต
            if (!data.is_started) {
                waitingScreen.style.display = 'block';
                quizScreen.style.display = 'none';
                answerInput.value = '';
                answerInput.disabled = false;
                resultMsg.innerText = '';
                submitBtn.disabled = false;
                submitBtn.innerText = 'ส่งคำตอบ (Submit)';
                currentQuestionNumber = 0;
                hasSubmittedThisQuestion = false;
                return;
            }

            // แสดงหน้าจอทำโจทย์
            waitingScreen.style.display = 'none';
            quizScreen.style.display = 'block';

            // ตรวจสอบว่ามีการเปลี่ยนข้อคำถามใหม่หรือไม่
            if (data.current_number !== currentQuestionNumber) {
                currentQuestionNumber = data.current_number;
                hasSubmittedThisQuestion = false; 
                
                answerInput.value = ''; 
                answerInput.disabled = false;
                submitBtn.disabled = false;
                submitBtn.innerText = 'ส่งคำตอบ (Submit)';
                resultMsg.innerText = '';
                
                fetchMyScore(); 
                
                setTimeout(() => answerInput.focus(), 100);
            }

            // ตรวจสอบสถานะจบการแข่งขัน หรือ หมดเวลา
            if (data.is_end) {
                document.getElementById('question-number').innerText = '🏁 สิ้นสุดการแข่งขัน';
                document.getElementById('answer-form').style.display = 'none';
                resultMsg.innerText = '';
                fetchMyScore(); 
            } else {
                document.getElementById('question-number').innerText = `ส่งคำตอบข้อที่ ${data.current_number}`;
                document.getElementById('answer-form').style.display = 'block';

                if (data.is_time_up) {
                    answerInput.disabled = true;
                    submitBtn.disabled = true;
                    
                    if (hasSubmittedThisQuestion) {
                        submitBtn.innerText = '🔒 หมดเวลา (ส่งคำตอบสำเร็จแล้ว)';
                        resultMsg.innerHTML = '<span style="color: #4caf50;">✅ ส่งคำตอบเรียบร้อยในเวลากำหนด!</span>';
                    } else {
                        submitBtn.innerText = '🔒 หมดเวลาส่งคำตอบ';
                        resultMsg.innerHTML = '<span style="color: #f44336;">❌ คุณไม่ได้ส่งคำตอบในเวลากำหนด</span>';
                    }
                }
            }
        })
        .catch(err => console.error('Error fetching game state:', err));
    }

    // ฟังก์ชันส่งคำตอบไปยัง Backend
    function submitAnswer(event) {
        event.preventDefault();
        
        const answerInput = document.getElementById('answer-input');
        const answerText = answerInput.value.trim();
        const submitBtn = document.getElementById('submit-btn');
        const resultMsg = document.getElementById('result-message');

        if (!answerText || hasSubmittedThisQuestion) return;

        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังส่ง...';

        fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                school: teamName,  // 🌟 ส่งชื่อทีมไปให้ Backend แทนชื่อจริง
                player_id: playerId,  
                answer: answerText
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                hasSubmittedThisQuestion = true;
                resultMsg.innerHTML = '<span style="color: #4caf50;">✅ ส่งคำตอบเรียบร้อย!</span>';
                submitBtn.innerText = 'ส่งคำตอบสำเร็จแล้ว';
                answerInput.disabled = true;
                
                fetchMyScore(); 
            } else {
                resultMsg.innerHTML = `<span style="color: #f44336;">⚠️ เกิดข้อผิดพลาด: ${data.message}</span>`;
                submitBtn.disabled = false;
                submitBtn.innerText = 'ส่งคำตอบ (Submit)';
            }
        })
        .catch(err => {
            console.error('Error submitting answer:', err);
            submitBtn.disabled = false;
            submitBtn.innerText = 'ส่งคำตอบ (Submit)';
        });
    }

    // รันฟังก์ชันเมื่อเปิดหน้าเว็บ
    window.onload = initPlayer;
</script>

</body>
</html>
